<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Store – Product</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <input type="text" id="searchInput" placeholder="Search products..." class="search-input">
  <main class="container product-detail-container">
    <div class="product-detail" id="productDetail"></div>
    <section class="section"><h3>You May Also Like</h3><div class="products-grid" id="relatedProducts"></div></section>
  </main>
  <div id="footer-placeholder"></div>
  <div class="floating-cart-btn" id="floatingCartBtn"><i class="fas fa-shopping-cart"></i><span class="cart-count-badge" id="cartCountBadge">0</span></div>
  <a href="https://wa.me/2348012345678" class="floating-wa-btn" target="_blank"><i class="fab fa-whatsapp"></i></a>
  <div class="cart-sidebar" id="cartSidebar"><div class="cart-header"><h3>Your Cart</h3><button class="close-cart" id="closeCartBtn">&times;</button></div><div class="cart-items" id="cartItemsContainer"></div><div class="cart-footer"><div class="cart-total">Total: <span id="cartTotalAmount">₦0</span></div><button class="btn btn-primary checkout-wa-btn" id="checkoutWhatsAppBtn">Checkout on WhatsApp</button></div></div>
  <div class="cart-overlay" id="cartOverlay"></div>

  <script src="cart.js"></script>
  <script src="script.js"></script>
  <script>
    let allProducts = [];
    document.addEventListener('DOMContentLoaded', async () => {
      await loadHeaderFooter();
      const res = await fetch('products.json');
      allProducts = await res.json();
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');
      const product = allProducts.find(p => p.id === productId);
      if(product) renderProductDetail(product);
      const related = allProducts.filter(p => p.category === product?.category && p.id !== productId).slice(0,4);
      renderProductGrid('relatedProducts', related);
      initCartEvents();
    });
    function renderProductDetail(p){
      const container = document.getElementById('productDetail');
      container.innerHTML = `<div class="detail-img"><img src="${p.image}" alt="${p.name}"></div><div class="detail-info"><h2>${p.name}</h2><p class="category">${p.category}</p><p class="desc">${p.description}</p><p class="price-lg">₦${p.price.toLocaleString()}</p><div class="detail-actions"><button class="btn-add-cart-lg" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}" data-img="${p.image}">Add to Cart</button><button class="btn-whatsapp-order" id="directWABtn">Order on WhatsApp</button></div></div>`;
      document.querySelector('.btn-add-cart-lg')?.addEventListener('click',()=>{ addToCart({id:p.id,name:p.name,price:p.price,image:p.image,quantity:1}); alert('Added to cart!'); });
      document.getElementById('directWABtn')?.addEventListener('click',()=>{ const msg = `Order: ${p.name} - ₦${p.price}`; window.open(`https://wa.me/2348012345678?text=${encodeURIComponent(msg)}`,'_blank'); });
    }
    function renderProductGrid(containerId,products){
      const cont=document.getElementById(containerId); if(!cont) return;
      cont.innerHTML=products.map(p=>`<div class="product-card"><img src="${p.image}" alt="${p.name}"><div class="product-info"><h4>${p.name}</h4><p class="price">₦${p.price.toLocaleString()}</p><a href="product.html?id=${p.id}" class="btn-view">View</a></div></div>`).join('');
    }
  </script>
</body>
</html>
