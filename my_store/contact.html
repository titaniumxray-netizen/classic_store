<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Store – Contact</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="container contact-page">
    <h1>Contact Us</h1>
    <div class="contact-grid">
      <div class="contact-info">
        <p><i class="fab fa-whatsapp"></i> WhatsApp: <strong>+234 801 234 5678</strong></p>
        <p><i class="fas fa-envelope"></i> Email: support@classstore.com</p>
        <p><i class="fas fa-clock"></i> Business Hours: Mon–Sat, 9am – 6pm (WAT)</p>
        <p><i class="fas fa-headset"></i> Support: Instant reply via WhatsApp</p>
      </div>
      <div class="contact-form">
        <h3>Send a message</h3>
        <input type="text" placeholder="Your name" id="contactName">
        <input type="email" placeholder="Email">
        <textarea rows="4" placeholder="How can we help?"></textarea>
        <button class="btn btn-primary" id="fakeSendBtn">Send Inquiry</button>
        <p class="form-note">Our team will respond within 2 hours on WhatsApp.</p>
      </div>
    </div>
    <div class="wa-support-box">
      <i class="fab fa-whatsapp"></i> Need help with an order? <a href="https://wa.me/2348012345678?text=Order%20inquiry" target="_blank">Chat now</a>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <div class="floating-cart-btn" id="floatingCartBtn"><i class="fas fa-shopping-cart"></i><span class="cart-count-badge" id="cartCountBadge">0</span></div>
  <a href="https://wa.me/2348012345678" class="floating-wa-btn" target="_blank"><i class="fab fa-whatsapp"></i></a>
  <div class="cart-sidebar" id="cartSidebar">...</div><div class="cart-overlay" id="cartOverlay"></div>
  <script src="cart.js"></script>
  <script src="script.js"></script>
  <script>document.addEventListener('DOMContentLoaded',async()=>{await loadHeaderFooter();initCartEvents();document.getElementById('fakeSendBtn')?.addEventListener('click',()=>alert('Demo: Your message would be sent to WhatsApp support.'));});</script>
</body>
</html>
